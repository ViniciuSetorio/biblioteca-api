services:
  # API Gateway
  - type: web
    name: biblioteca-gateway
    runtime: docker
    repo: https://github.com/ViniciuSetorio/biblioteca-api
    branch: main
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    envVars:
      - key: NODE_ENV
        value: production
      - key: USUARIOS_URL
        value: https://biblioteca-usuarios.onrender.com
      - key: LIVROS_URL
        value: https://biblioteca-livros.onrender.com
      - key: EMPRESTIMOS_URL
        value: https://biblioteca-emprestimos.onrender.com
      - key: MULTAS_URL
        value: https://biblioteca-multas.onrender.com

  # Serviço de Usuários
  - type: web
    name: biblioteca-usuarios
    runtime: docker 
    repo: https://github.com/ViniciuSetorio/biblioteca-api
    branch: main
    dockerfilePath: ./servico-usuarios/Dockerfile
    dockerContext: ./servico-usuarios
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${NEON_DB_URL_BASE}/usuarios_db?sslmode=require&channel_binding=require
      - fromGroup: biblioteca-secrets
      - key: EMPRESTIMOS_SERVICE_URL
        value: https://biblioteca-emprestimos.onrender.com

  # Serviço de Livros
  - type: web
    name: biblioteca-livros
    runtime: docker 
    repo: https://github.com/ViniciuSetorio/biblioteca-api
    branch: main
    dockerfilePath: ./servico-livros/Dockerfile
    dockerContext: ./servico-livros
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${NEON_DB_URL_BASE}/livros_db?sslmode=require&channel_binding=require
      - fromGroup: biblioteca-secrets 
      - key: USUARIOS_SERVICE_URL
        value: https://biblioteca-usuarios.onrender.com
      - key: EMPRESTIMOS_SERVICE_URL
        value: https://biblioteca-emprestimos.onrender.com

  # Serviço de Empréstimos
  - type: web
    name: biblioteca-emprestimos
    runtime: docker 
    repo: https://github.com/ViniciuSetorio/biblioteca-api
    branch: main
    dockerfilePath: ./servico-emprestimos/Dockerfile
    dockerContext: ./servico-emprestimos
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${NEON_DB_URL_BASE}/emprestimos_db?sslmode=require&channel_binding=require
      - fromGroup: biblioteca-secrets
      - key: USUARIOS_SERVICE_URL
        value: https://biblioteca-usuarios.onrender.com
      - key: LIVROS_SERVICE_URL
        value: https://biblioteca-livros.onrender.com
      - key: MULTAS_SERVICE_URL
        value: https://biblioteca-multas.onrender.com
      - key: NOTIFICACOES_SERVICE_URL
        value: https://biblioteca-notificacoes.onrender.com

  # Serviço de Multas
  - type: web
    name: biblioteca-multas
    runtime: docker 
    repo: https://github.com/ViniciuSetorio/biblioteca-api
    branch: main
    dockerfilePath: ./servico-multas/Dockerfile
    dockerContext: ./servico-multas
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${NEON_DB_URL_BASE}/multas_db?sslmode=require&channel_binding=require
      - fromGroup: biblioteca-secrets
      - key: EMPRESTIMOS_SERVICE_URL
        value: https://biblioteca-emprestimos.onrender.com

  # Serviço de Notificações
  - type: web
    name: biblioteca-notificacoes
    runtime: docker 
    repo: https://github.com/ViniciuSetorio/biblioteca-api
    branch: main
    dockerfilePath: ./servico-notificacoes/Dockerfile
    dockerContext: ./servico-notificacoes
    envVars:
      - key: NODE_ENV
        value: production
      - key: USUARIOS_SERVICE_URL
        value: https://biblioteca-usuarios.onrender.com
      - key: EMPRESTIMOS_SERVICE_URL
        value: https://biblioteca-emprestimos.onrender.com
      - key: LIVROS_SERVICE_URL
        value: https://biblioteca-livros.onrender.com