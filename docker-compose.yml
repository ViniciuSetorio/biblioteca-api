services:
  postgres:
    image: postgres:15-alpine
    container_name: biblioteca-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca_thygo
      POSTGRES_USER: thygo_admin
      POSTGRES_PASSWORD: Senha@123Biblioteca
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/biblioteca.sql:/docker-entrypoint-initdb.d/01-biblioteca.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thygo_admin -d biblioteca_thygo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biblioteca-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PGUSER=thygo_admin
      - PGPASSWORD=Senha@123Biblioteca
      - PGDATABASE=biblioteca_thygo
      - PGHOST=postgres
      - PGPORT=5432
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biblioteca-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data: